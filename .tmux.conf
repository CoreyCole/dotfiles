set -g mode-keys vi

# Enable mouse support
set -g mouse on

bind h if -F '#{pane_at_left}' '' 'select-pane -L'
bind j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind k if -F '#{pane_at_top}' '' 'select-pane -U'
bind l if -F '#{pane_at_right}' '' 'select-pane -R'

# Alt+Shift+hjkl for pane switching without prefix (no wrap)
bind-key -n M-H if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -n M-J if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -n M-K if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -n M-L if -F '#{pane_at_right}' '' 'select-pane -R'

# Unbind Ctrl+Alt+h/l (remove window switching)
unbind-key -n C-M-h
unbind-key -n C-M-l

# Ctrl+Alt+hjkl for splitting panes without prefix
bind-key -n C-M-h split-window -h -b -c "#{pane_current_path}"
bind-key -n C-M-j split-window -v -c "#{pane_current_path}"
bind-key -n C-M-k split-window -v -b -c "#{pane_current_path}"
bind-key -n C-M-l split-window -h -c "#{pane_current_path}"

# Alt+t to cycle through windows
bind-key -T root M-t next-window

# Alt+r / Alt+R to switch pane layout
bind-key -T root M-r select-layout even-vertical
bind-key -T root M-R select-layout even-horizontal

# Alt+0/1/2/3/q/w/e/a/s/d for tmux windows 0-9 (create if doesn't exist)
bind-key -T root M-` if-shell "tmux list-windows -F '##I' | grep -q '^0$'" "select-window -t :0" "new-window -c \"#{pane_current_path}\" -t :0"
bind-key -T root M-0 if-shell "tmux list-windows -F '##I' | grep -q '^0$'" "select-window -t :0" "new-window -c \"#{pane_current_path}\" -t :0"
bind-key -T root M-1 if-shell "tmux list-windows -F '##I' | grep -q '^1$'" "select-window -t :1" "new-window -c \"#{pane_current_path}\" -t :1"
bind-key -T root M-2 if-shell "tmux list-windows -F '##I' | grep -q '^2$'" "select-window -t :2" "new-window -c \"#{pane_current_path}\" -t :2"
bind-key -T root M-3 if-shell "tmux list-windows -F '##I' | grep -q '^3$'" "select-window -t :3" "new-window -c \"#{pane_current_path}\" -t :3"
bind-key -T root M-q if-shell "tmux list-windows -F '##I' | grep -q '^4$'" "select-window -t :4" "new-window -c \"#{pane_current_path}\" -t :4"
bind-key -T root M-w if-shell "tmux list-windows -F '##I' | grep -q '^5$'" "select-window -t :5" "new-window -c \"#{pane_current_path}\" -t :5"
bind-key -T root M-e if-shell "tmux list-windows -F '##I' | grep -q '^6$'" "select-window -t :6" "new-window -c \"#{pane_current_path}\" -t :6"
bind-key -T root M-a if-shell "tmux list-windows -F '##I' | grep -q '^7$'" "select-window -t :7" "new-window -c \"#{pane_current_path}\" -t :7"
bind-key -T root M-s if-shell "tmux list-windows -F '##I' | grep -q '^8$'" "select-window -t :8" "new-window -c \"#{pane_current_path}\" -t :8"
bind-key -T root M-d if-shell "tmux list-windows -F '##I' | grep -q '^9$'" "select-window -t :9" "new-window -c \"#{pane_current_path}\" -t :9"

# Ctrl+Shift+Alt+0/1/2/3/q/w/e/a/s/d to close tmux windows 0-9
bind-key -T root C-S-M-0 kill-window -t :0
bind-key -T root C-S-M-1 kill-window -t :1
bind-key -T root C-S-M-2 kill-window -t :2
bind-key -T root C-S-M-3 kill-window -t :3
bind-key -T root C-S-M-q kill-window -t :4
bind-key -T root C-S-M-w kill-window -t :5
bind-key -T root C-S-M-e kill-window -t :6
bind-key -T root C-S-M-a kill-window -t :7
bind-key -T root C-S-M-s kill-window -t :8
bind-key -T root C-S-M-d kill-window -t :9

# Setup 'v' to begin selection
bind -Tcopy-mode-vi v send -X begin-selection
# Use tmux's native clipboard integration
bind -Tcopy-mode-vi y send -X copy-selection-and-cancel
# allow OSC 52 clipboard passthrough (needed for nested tmux/SSH clipboard and nvim over SSH)
set -g set-clipboard on
# allow escape sequences to pass through to outer terminal (needed for clipboard passthrough and cmux sidebar)
set -g allow-passthrough on

# visual block selection with ctrl+v
bind-key -Tcopy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle

# Setup 'Enter' to copy selection via tmux clipboard integration
unbind-key -Tcopy-mode-vi Enter
bind-key -Tcopy-mode-vi Enter send -X copy-selection-and-cancel

# Prevent mouse selection from auto-scrolling to bottom
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g status-style bg='#000000',fg=white
set -g message-style bg='#121212',fg=white

# Window list styling
set -g status-justify left
set -g status-position bottom
set -g window-status-separator ""

# Inactive windows - transparent with gray text
set -g window-status-style default
set -g window-status-format "#[fg=#808080,bg=#000000] #I #[default]"

# Active window - accent color changes based on mode (red=local, blue=remote)
set -g window-status-current-style default
set -g window-status-current-format "#{?#{==:#{client_key_table},off},#[fg=#ffffff]#[bg=#4a7a9b]#[bold] #I ,#[fg=#ffffff]#[bg=#D16969]#[bold] #I }#[default]"

# Session name + mode indicator
set -g status-left "#[fg=#808080,bg=#000000] #{session_name} #[default]"
set -g status-right "#{?#{==:#{client_key_table},off},#[fg=#4a7a9b]● remote ,}"

# Pane border colors (lighter gray)
set -g pane-border-style fg='#090909'
set -g pane-active-border-style fg='#a0a0a0'

# support true color escape sequences
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*:Tc"  # Wildcard for all terminals
set -sa terminal-features ",*:RGB"
set -sa terminal-features ",*:clipboard"

# cursor shape support for neovim
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

set -g extended-keys on
set -g extended-keys-format csi-u

bind-key r source-file ~/.tmux.conf \; display "Reloaded from ~/.tmux.conf"

set -g update-environment "SSH_TTY SSH_CONNECTION SSH_AUTH_SOCK"

set -g default-shell "/bin/zsh"
set -g default-command "/bin/zsh"

