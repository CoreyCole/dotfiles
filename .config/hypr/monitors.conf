# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Match monitors by description so DisplayLink port reassignment doesn't break layout
env = GDK_SCALE,1

# Dell U2717D 27" — portrait mode
monitor = desc:Dell Inc. DELL U2717D, 2560x1440, 0x0, 1, transform, 1

# LG 32GK650G 32" — landscape
monitor = desc:LG Electronics 32GK650G, 2560x1440, 1440x0, 1

# LG TV — landscape
monitor = desc:LG Electronics LG TV, 3840x2160, 4000x0, 1

# Fallback: any unrecognized monitor gets auto-placed in landscape
monitor = , preferred, auto, 1

# Workspace assignments: Dell 1-3, LG 32" 4-6, TV 7-10
workspace = 1, monitor:desc:Dell Inc. DELL U2717D, default:true, persistent:true
workspace = 2, monitor:desc:Dell Inc. DELL U2717D, persistent:true
workspace = 3, monitor:desc:Dell Inc. DELL U2717D, persistent:true
workspace = 4, monitor:desc:LG Electronics 32GK650G, default:true, persistent:true
workspace = 5, monitor:desc:LG Electronics 32GK650G, persistent:true
workspace = 6, monitor:desc:LG Electronics 32GK650G, persistent:true
workspace = 7, monitor:desc:LG Electronics LG TV, default:true, persistent:true
workspace = 8, monitor:desc:LG Electronics LG TV, persistent:true
workspace = 9, monitor:desc:LG Electronics LG TV, persistent:true
workspace = 10, monitor:desc:LG Electronics LG TV, persistent:true
